server:
  port: 0


# Eureka Client "user-service" -> Eureka Server
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/inspire
    username: root
    password: 123456789
  
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create
    show-sql: true
    # properties:
    #   hibernate:
    #     dialect: org.hibernate.dialect.MariaDBDialect
    #     format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 6000ms

  cloud:
    bus:
      enabled: true